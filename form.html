<body>
    <div>
        <h1>Tell us about yourself!!</h1>
        <p> Fill this form to describe more about yourself <br> Thank you! :)</p>
        <br>
        <form method="post" action="form_response.html">
            <label for="username">Last Name:</label>
            <input type="text" required="" name="username">
            <br><br>
            <label for="username"> First Name:</label>
            <input type="text" name="username" required="">
            <br><br>
            <label for="">Other Name:</label>
            <input type="text" name="optional" placeholder="optional">
            <br><br>
            <label for="dob">Date of birth:</label>
            <input type="date" name="dob">
            <br><br>
            <label for="age">Age:</label>
            <input type="number" name="age">
            <br><br><br>
            <input type="submit" name="submit" value="send" placeholder=":)">
        </form>
    </div>
